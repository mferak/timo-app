name: Feature request
description: Suggest something you'd like to see in Timo
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: What's the timezone or scheduling problem this would solve for you?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Anything you've tried as a workaround?
    validations:
      required: false
