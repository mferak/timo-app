name: Bug report
description: Something in Timo isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do right before this happened?
      placeholder: |
        1. Open Timo
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen instead?
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. iPhone 16 Pro"
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. iOS 26.2"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Timo version
      description: Found in Settings → About
    validations:
      required: false
